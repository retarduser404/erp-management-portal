{% extends 'base.html' %}

{% block content_login %}
    <div class="card" style="width: 100%; max-width: 420px; padding: 40px; margin: auto;">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fa-solid fa-graduation-cap" style="font-size: 40px; color: var(--primary); margin-bottom: 15px;"></i>
            <h2 style="font-weight: 700;">Welcome Back</h2>
            <p style="color: #8f9bba; font-size: 14px; margin-top: 5px;">Sign in to the College Admin Portal</p>
        </div>
        
        <form action="{{ url_for('do_login') }}" method="POST">
            <div style="margin-bottom: 20px;">
                <label>System Role</label>
                <select name="role">
                    <option value="admin">Administrator</option>
                    <option value="faculty">Faculty Member</option>
                    <option value="student">Student</option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <label>Email / Username</label>
                <input type="text" name="username" placeholder="admin@college.edu" required>
            </div>

            <div style="margin-bottom: 30px;">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••••••" required>
            </div>

            <button type="submit" style="width: 100%; font-size: 16px; padding: 15px;">
                <i class="fa-solid fa-right-to-bracket"></i> Secure Sign In
            </button>
        </form>
    </div>
{% endblock %}
