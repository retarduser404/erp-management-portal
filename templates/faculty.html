{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <div>
        <h1>Faculty Directory</h1>
        <p style="color: #8f9bba;">Manage academic staff and department assignments.</p>
    </div>
    <button><i class="fa-solid fa-plus"></i> Add Faculty</button>
</div>

<div class="card">
    <table>
        <tr>
            <th>Employee ID</th>
            <th>Faculty Name</th>
            <th>Department</th>
            <th>Status</th>
        </tr>
        {% for f in faculty %}
        <tr>
            <td><strong>{{ f.id }}</strong></td>
            <td>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 35px; height: 35px; background: #e9edf4; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--primary);">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                    {{ f.name }}
                </div>
            </td>
            <td><span class="badge badge-primary">{{ f.department }}</span></td>
            <td><span class="badge badge-success">Active</span></td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
