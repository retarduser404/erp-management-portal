<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College ERP - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display: block;"> {% if request.path != '/' %}
        <div class="sidebar">
            <h2><i class="fa-solid fa-graduation-cap"></i> ERP Pro</h2>
            <a href="{{ url_for('dashboard') }}" class="{% if request.path == '/dashboard' %}active{% endif %}"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="{{ url_for('students') }}" class="{% if request.path == '/students' %}active{% endif %}"><i class="fa-solid fa-user-graduate"></i> Students</a>
            <a href="{{ url_for('faculty') }}"><i class="fa-solid fa-chalkboard-user"></i> Faculty</a>
            <a href="{{ url_for('attendance') }}"><i class="fa-solid fa-calendar-check"></i> Attendance</a>
            <a href="{{ url_for('marks') }}"><i class="fa-solid fa-file-signature"></i> Results</a>
            <a href="{{ url_for('fees') }}"><i class="fa-solid fa-wallet"></i> Fees</a>
            <a href="{{ url_for('timetable') }}"><i class="fa-solid fa-clock"></i> Timetable</a>
            <a href="{{ url_for('login') }}" style="margin-top: auto; color: var(--danger);"><i class="fa-solid fa-power-off"></i> Logout</a>
        </div>

        <div class="main-content">
            {% block content %}{% endblock %}
        </div>

    {% else %}
        <div class="login-screen">
            {% block content_login %}{% endblock %}
        </div>
    {% endif %}

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
